apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "graylog-auth-proxy.fullname" . }}-test-connection"
  labels:
    {{- include "graylog-auth-proxy.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox:1.36
      command: ['wget']
      args: ['--spider', '--timeout=5', 'http://{{ include "graylog-auth-proxy.fullname" . }}:{{ .Values.service.port | default 8080 }}/healthz']
  restartPolicy: Never
