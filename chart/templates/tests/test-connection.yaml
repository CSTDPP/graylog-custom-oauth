{{- if .Values.test.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "graylog-auth-proxy.fullname" . }}-test-connection"
  labels:
    {{- include "graylog-auth-proxy.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  {{- with .Values.image.pullSecrets }}
  imagePullSecrets:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  containers:
    - name: test
      image: "{{ .Values.test.image.repository | default "busybox" }}:{{ .Values.test.image.tag | default "1.36" }}"
      command:
        - /bin/sh
        - -c
        - |
          wget --spider --no-check-certificate --timeout=10 \
            https://{{ include "graylog-auth-proxy.fullname" . }}-svc:{{ .Values.service.port }}/healthz
  restartPolicy: Never
{{- end }}
